<section class="pt-24 md:pt-40 xl:pt-48 2xl:pt-56 pb-8 md:pb-18 xl:pb-22 relative bg-d3 overflow-hidden rounded-bl-3xl xl:rounded-bl-[50px] srounded-br-3xl xl:rounded-br-[50px]">
    <div class="relative wrapper text-center space-y-3.5 z-10">
      <h1 class="h1">{{"Magics Benefits" | translate}}</h1>
      <div class="flex items-center justify-center space-x-2">
        <span class="text-sm md:text-base lg:text-lg text-d4 font-normal cursor-pointer" [routerLink]="'/home'">{{"Home" | translate}}</span>
        <span class="icon-star text-14 text-secondary"></span>
        <span class="text-sm md:text-base lg:text-lg text-primary font-normal">{{"Magics Benefits" | translate}}</span>
      </div>
    </div>
    <img src="./assets/images/tree_bg.webp" class="absolute inset-0 w-full h-full object-cover opacity-20" alt="bg-cover"/>
</section>
<section class="w-full max-w-[1440px] mx-auto px-5 py-10 md:py-16 xl:py-20">
    <div class="flex flex-wrap items-start -mx-2.5 lg:-mx-3 xl:-mx-3.5">
        <div class="w-full md:w-1/2 xl:w-1/3 p-2.5 lg:p-3 xl:p-3.5" *ngFor="let item of benefitsList">
            <div class="bg-gray-100 rounded-md">
                <div  *ngIf="item.media">
                    <img [src]="constants.baseImageUrl + item?.media" alt="item" class="w-full h-70" />
                </div>
                <div  *ngIf="!item.media">
                    <img [src]="constants.defaultImage " alt="item2" class="w-full h-70" />
                </div>
                <div class="flex items-start p-2.5 lg:p-5 space-x-2.5 lg:space-x-5">
                    <span class="icon-true text-26 lg:text-40 text-primary"></span>
                    <span class="text-18 lg:text-[22px] text-secondary font-bold text-left">{{item?.title}}</span>                    
                </div>
            </div>
        </div>
    </div>
</section>
