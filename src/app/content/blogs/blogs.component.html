<section class="pt-24 md:pt-40 xl:pt-48 2xl:pt-56 pb-8 md:pb-18 xl:pb-22 relative bg-d3 overflow-hidden rounded-bl-3xl xl:rounded-bl-[50px] srounded-br-3xl xl:rounded-br-[50px]">
    <div class="relative wrapper text-center space-y-3.5 z-10">
      <h1 class="h1">{{"Tips & Tricks" | translate}}</h1>
      <div class="flex items-center justify-center space-x-2">
        <span class="text-sm md:text-base lg:text-lg text-d4 font-normal cursor-pointer" [routerLink]="'/home'">{{"Home" | translate}}</span>
        <span class="icon-star text-14 text-secondary"></span>
        <span class="text-sm md:text-base lg:text-lg text-primary font-normal">{{"Stories" | translate}}</span>
      </div>
    </div>
    <img src="./assets/images/tree_bg.webp" class="absolute inset-0 w-full h-full object-cover opacity-20" alt="bg-cover"/>
</section>
<!-- Our latest blogs -->
<section class="w-full max-w-[1440px] mx-auto px-5 py-10 md:py-16 xl:py-20">
    <div class="flex flex-wrap items-center justify-center -mx-2.5 lg:-mx-3 xl:-mx-3.5 pt-2 lg:pt-8 xl:pt-12" *ngIf="!isStoryloading">
        <div class="w-full md:w-1/2 xl:w-1/3 p-2.5 lg:p-3 xl:p-3.5" *ngFor="let item of storiesList">
            <div class="bg-white rounded-md shadow-two overflow-hidden cursor-pointer h-full" (click)="getStoriesDetails(item?._id,item?.search_tag)">
                <div class="relative w-full">
                    <img *ngIf="item?.mediatype == 'image'" [src]="item?.media ? constants.baseImageUrl + item.media : constants.defaultImage" alt="Benefits" class="w-full h-56 lg:h-72 xl:h-[300px] 2xl:h-[333px] object-top object-cover" />
                    <video controls class="w-full h-56 lg:h-72 xl:h-[300px] 2xl:h-[333px] object-top object-cover" poster="" *ngIf="item?.mediatype == 'video'">
                        <source [src]="item?.media ? (constants.baseImageUrl + item?.media) : constants.defaultImage" type="video/mp4">
                    </video>
                    <div class="absolute top-full right-1 -translate-y-9 flex items-center bg-primary/80 backdrop-blur-sm rounded-md divide-x-2 divide-white px-2.5">
                        <div class="pr-1">
                            <div class="flex items-center space-x-1">
                                <span class="text-base font-semibold text-white">Like</span>
                                <span class="icon-like_{{item?.isLike ? 'fill' : 'unfill'}} text-xl text-white" (click)="checkLogin($event,item)"></span>
                                <span class="text-base font-semibold text-white">&nbsp;&nbsp;</span>
                                <span class="text-base font-medium text-white">{{item?.totallike ? item?.totallike : '0'}}</span>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="p-2.5 lg:px-5 py-5 lg:py-6 xl:py-[30px] space-y-2.5 lg:space-y-5">
                    <div class="flex items-start justify-between text-14">
                        <span class="text-primary font-medium">{{item?.author}}</span>                    
                        <span class="text-d4 font-normal">{{item?.updatedAt | date:'MMM dd, yyyy h:mm a'}}</span>
                    </div>
                    <div class="text-xl lg:text-24 xl:text-26 font-bold text-secondary line-clamp-2">{{item?.title}}</div>
                    <!-- <span class="block text-14 lg:text-16 xl:text-18 text-secondary/70 ">{{item?.brief}}</span> -->
                    <p class="text-14 lg:text-16 xl:text-18 text-secondary/70 line-clamp-3">{{(item.aboutStoryDesc) ? item?.brief : item?.brief}}</p>

                    <div class="text-center">
                        <span class="inline-block text-base font-semibold text-primary underline decoration-slate-900 cursor-pointer"  (click)="getStoriesDetails(item?._id,item?.search_tag)">{{"View More" | translate}}</span>
                    </div>
                    <!-- <a href="javascript:;" (click)="item.aboutStoryDesc=true;$event.stopPropagation()" *ngIf="!item.aboutStoryDesc && item?.brief.length > 180" class="text-magicPotion text-sm font-semibold cursor-pointer">...Read More</a>
                    <a href="javascript:;" (click)="item.aboutStoryDesc=false;$event.stopPropagation()" *ngIf="item.aboutStoryDesc && item?.brief.length > 180" class="text-magicPotion text-sm font-semibold cursor-pointer">...Read Less</a> -->
                </div>
            </div>
        </div>        
    </div>

<div class="fixed inset-0 w-full h-screen flex overflow-y-auto z-[998]" *ngIf="isOpenLoginForm" id="btnClose">
    <span class="fixed inset-0 w-full h-full block bg-black/30 backdrop-blur-sm pointer-events-none"></span> <!--  (click)="isOpenLoginForm = !isOpenLoginForm" *ngIf="isOpenLoginForm" -->
    <div class="relative z-[999] m-auto py-7 px-3.5 scroll_not anim">
      <app-login [isUnknowUser]='isOpenLoginForm'  (isOpenForGetPinFormPopup)="isOpenForGetPinFormPopup($event)" (isOpenRegisterFormPopup)="isOpenRegisterFormPopup($event)" (unknowUserlogIn)="unknowUserlogIn($event)"></app-login>
    </div>
</div>
