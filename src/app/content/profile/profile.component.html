<section class="pt-24 md:pt-40 xl:pt-48 2xl:pt-56 pb-8 md:pb-18 xl:pb-22 relative bg-d3 overflow-hidden rounded-bl-3xl xl:rounded-bl-[50px] srounded-br-3xl xl:rounded-br-[50px]">
  <div class="relative wrapper text-center space-y-3.5 z-10">
    <h1 class="h1">{{"Profile" | translate}}</h1>
    <div class="flex items-center justify-center space-x-2">
      <span class="text-sm md:text-base lg:text-lg text-d4 font-normal cursor-pointer" [routerLink]="'/home'">{{"Home" | translate}}</span>
     <span class="icon-star text-14 text-secondary"></span>
      <span class="text-sm md:text-base lg:text-lg text-primary font-normal">{{"Profile" | translate}}</span>
    </div>
  </div>
  <img src="./assets/images/tree_bg.webp" class="absolute inset-0 w-full h-full object-cover opacity-20" alt="bg-cover"/>
</section>
<div class="w-full py-12 lg:py-16 xl:py-20 2xl:py-24" (scroll)="onScroll($event)">
  <div class="wrapper px-0 sm:px-5">
    <div class="flex flex-wrap lg:flex-nowrap items-start justify-center lg:justify-normal">
      <ul class="flex lg:flex-col bg-d3/10 lg:bg-d3/20 rounded-lg overflow-x-auto scroll-none lg:overflow-hidden">
        <li class="profile-link flex items-center space-x-2.5 sm:space-x-3 md:space-x-4 xl:space-x-8 cursor-pointer py-2.5 sm:py-3 md:py-3.5 lg:py-4 xl:py-5 px-5 sm:px-6 md:px-8 lg;px-10 xl:px-12" [routerLink]="'account'" routerLinkActive="active">
          <span class="block icon-unfill_user text-16 sm:text-xl md:text-24 lg:text-[28px]  xl:text-[32px]"></span>
          <span class="block text-sm sm:text-base md:text-lg lg:text-xl xl:text-[22px] whitespace-nowrap font-semibold xl:font-bold text-inherit">{{"My Accounts" | translate}}</span>
        </li>
        <li class="profile-link flex items-center space-x-2.5 sm:space-x-3 md:space-x-4 xl:space-x-8 cursor-pointer py-2.5 sm:py-3 md:py-3.5 lg:py-4 xl:py-5 px-5 sm:px-6 md:px-8 lg;px-10 xl:px-12" [routerLink]="'order'" routerLinkActive="active">
          <span class="block icon-unfill_order text-16 sm:text-xl md:text-24 lg:text-[28px]  xl:text-[32px]"></span>
          <span class="block text-sm sm:text-base md:text-lg lg:text-xl xl:text-[22px] whitespace-nowrap font-semibold xl:font-bold text-inherit">{{"My Orders" | translate}}</span>
        </li>
        <li class="profile-link flex items-center space-x-2.5 sm:space-x-3 md:space-x-4 xl:space-x-8 cursor-pointer py-2.5 sm:py-3 md:py-3.5 lg:py-4 xl:py-5 px-5 sm:px-6 md:px-8 lg;px-10 xl:px-12" [routerLink]="'subscription'" routerLinkActive="active">
          <span class="block icon-subscription text-16 sm:text-xl md:text-24 lg:text-[28px]  xl:text-[32px]"></span>
          <span class="block text-sm sm:text-base md:text-lg lg:text-xl xl:text-[22px] whitespace-nowrap font-semibold xl:font-bold text-inherit">{{"My Subscription" | translate}}</span>
        </li>
        <li class="profile-link flex items-center space-x-2.5 sm:space-x-3 md:space-x-4 xl:space-x-8 cursor-pointer py-2.5 sm:py-3 md:py-3.5 lg:py-4 xl:py-5 px-5 sm:px-6 md:px-8 lg;px-10 xl:px-12">
          <span class="block icon-log-out text-16 sm:text-xl md:text-24 lg:text-[28px]  xl:text-[32px]"></span>
          <span class="block text-sm sm:text-base md:text-lg lg:text-xl xl:text-[22px] whitespace-nowrap font-semibold xl:font-bold text-inherit" (click)="logoutSite()">{{"Logout" | translate}}</span>
        </li>
      </ul>
      <div class="w-full lg:w-[calc(100%-325px)] mt-5 lg:mt-0 lg:pl-5">
        <router-outlet></router-outlet>
      </div>
    </div>
  </div>
</div>
